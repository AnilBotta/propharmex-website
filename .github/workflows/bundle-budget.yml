name: Bundle budget

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  budget:
    name: First-Load JS budget gate (150 kB)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the web app and tee stdout into build.log so the budget
      # script can parse the route-size table that next build prints.
      # We DO NOT run this through turbo's build cache — Lighthouse CI
      # uses turbo, but here we want the fresh `next build` output every
      # time so the budget gate can't be silently skipped on a cache hit.
      - name: Build
        run: pnpm --filter web build 2>&1 | tee build.log
        env:
          NEXT_PUBLIC_SITE_URL: https://propharmex.com
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}

      - name: Check First-Load JS budget
        run: node scripts/check-bundle-budget.mjs build.log
